version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: clouddeploylite-traefik
    restart: unless-stopped
    
    command:
      # Dashboard
      - "--api.dashboard=true"
      
      # Docker Provider
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=web"
      
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      
      # HTTP to HTTPS Redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      
      # Let's Encrypt (REPLACE YOUR_EMAIL)
      - "--certificatesresolvers.letsencrypt.acme.email=itsnirajmahto@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    
    networks:
      - web
    
    labels:
      - "traefik.enable=true"
      
      # Dashboard (REPLACE YOUR_DOMAIN)
      - "traefik.http.routers.dashboard.rule=Host(`traefik.psnlprojects.fun`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      
      # Basic Auth for Dashboard
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$8evjxm8r$$YuwCFcUZIVBvUZZjBMKXB."
      # Username: admin, Password: password (CHANGE THIS!)
      # Generate new hash: htpasswd -nb admin yourpassword

networks:
  web:
    name: web
    driver: bridge